{% extends "base.html" %}
{% block content %}
  <h2 class="mb-3">العملاء</h2>
  <div class="card mb-3">
    <div class="card-header">إضافة عميل</div>
    <div class="card-body">
      <form method="post" class="row g-2">
        <div class="col-md-4">
          <input class="form-control" name="name" placeholder="اسم العميل *" required>
        </div>
        <div class="col-md-3">
          <input class="form-control" name="phone" placeholder="رقم الهاتف">
        </div>
        <div class="col-md-3">
          <input class="form-control" name="email" placeholder="البريد الإلكتروني">
        </div>
        <div class="col-md-2">
          <button class="btn btn-primary w-100">حفظ</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card-header">قائمة العملاء</div>
    <div class="table-responsive">
      <table class="table table-striped table-hover mb-0">
        <thead>
          <tr>
            <th>#</th>
            <th>الاسم</th>
            <th>الهاتف</th>
            <th>البريد</th>
            <th>إجراء</th>
          </tr>
        </thead>
        <tbody>
          {% for c in customers %}
            <tr>
              <td>{{ c.id }}</td>
              <td>{{ c.name }}</td>
              <td>{{ c.phone or "-" }}</td>
              <td>{{ c.email or "-" }}</td>
              <td>
                <form method="post" action="{{ url_for('delete_customer', customer_id=c.id) }}" onsubmit="return confirm('تأكيد حذف العميل؟');">
                  <button class="btn btn-sm btn-outline-danger">حذف</button>
                </form>
              </td>
            </tr>
          {% else %}
            <tr><td colspan="5" class="text-center text-muted py-4">لا يوجد عملاء بعد</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
{% endblock %}
